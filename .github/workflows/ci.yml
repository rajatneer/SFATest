name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ./SfaApp.sln

      - name: Build
        run: dotnet build ./SfaApp.sln --configuration Release --no-restore

      - name: Run Integration Tests
        run: dotnet test ./SfaApp.Web.Tests/SfaApp.Web.Tests.csproj --configuration Release --no-build --filter "Category=Integration"

  browser-smoke:
    name: Browser Smoke Test
    runs-on: ubuntu-latest
    needs: integration-tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: sfa_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ./SfaApp.sln

      - name: Build
        run: dotnet build ./SfaApp.sln --configuration Release --no-restore

      - name: Install Playwright Browser
        shell: pwsh
        run: ./SfaApp.Web.Tests/bin/Release/net9.0/playwright.ps1 install --with-deps chromium

      - name: Start Web App
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://127.0.0.1:5076
          ConnectionStrings__DefaultConnection: Server=127.0.0.1;Port=3306;Database=sfa_ci;User=root;Password=rootpw;
        run: |
          dotnet run --project ./SfaApp.Web/SfaApp.Web.csproj --configuration Release --no-build > app.log 2>&1 &

      - name: Wait For Web App
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:5076/ >/dev/null; then
              echo "Web app is up"
              exit 0
            fi
            sleep 2
          done
          echo "Web app failed to start"
          cat app.log
          exit 1

      - name: Run Browser Smoke Test
        env:
          RUN_BROWSER_SMOKE: "true"
          SMOKE_BASE_URL: http://127.0.0.1:5076
          SMOKE_ADMIN_EMAIL: admin@sfa.local
          SMOKE_ADMIN_PASSWORD: Admin@12345
        run: dotnet test ./SfaApp.Web.Tests/SfaApp.Web.Tests.csproj --configuration Release --no-build --filter "Category=BrowserSmoke"

      - name: Upload App Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: app-log
          path: app.log
